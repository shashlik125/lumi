<!-- Виджет Аси - стабильная версия -->
<div id="asya-widget">
  <div id="asya-icon" class="asya-icon">
    <div class="icon-avatar">
      <div class="avatar-face">
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="smile"></div>
      </div>
    </div>
    <div class="asya-name-badge">Ася</div>
    <div class="analytics-badge" id="analytics-badge" style="display:none;">📊</div>
  </div>

  <div id="asya-chat" class="asya-chat">
    <div class="chat-header">
      <span>Ася • эмоциональный помощник</span>
      <div>
        <button id="asya-analytics">📈</button>
        <button id="asya-close">✕</button>
      </div>
    </div>

    <div class="chat-body">
      <div id="asya-messages">
        <div class="message asya-message">
          Привет! Я Ася 💫 Расскажи, как прошёл твой день?
        </div>
      </div>

      <div class="chat-input">
        <input id="asya-input" placeholder="Напиши сообщение..." maxlength="500">
        <button id="asya-send">➤</button>
      </div>
    </div>
  </div>
</div>

<style>
#asya-widget {
  position: fixed;
  bottom: 25px;
  right: 25px;
  z-index: 9000;
  font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
}

.asya-icon {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  position: relative;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  transition: transform 0.2s;
}
.asya-icon:hover {
  transform: scale(1.05);
}

.icon-avatar {
  width: 40px;
  height: 40px;
  position: relative;
}
.eye {
  position: absolute;
  width: 8px;
  height: 8px;
  background: white;
  border-radius: 50%;
  top: 35%;
}
.eye.left { left: 8px; }
.eye.right { right: 8px; }
.smile {
  position: absolute;
  width: 16px;
  height: 8px;
  border: 2px solid white;
  border-top: none;
  border-radius: 0 0 16px 16px;
  bottom: 10px;
  left: 12px;
}

.asya-name-badge {
  position: absolute;
  top: -5px;
  right: -5px;
  background: linear-gradient(135deg, #FF70EC, #60F4E3);
  padding: 2px 8px;
  font-size: 10px;
  border-radius: 12px;
  font-weight: 700;
}
.analytics-badge {
  position: absolute;
  bottom: -8px;
  left: -8px;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: linear-gradient(135deg, #FFD93D, #FF6B6B);
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 14px;
}

.asya-chat {
  display: none;
  flex-direction: column;
  width: 420px;
  height: 600px;
  background: white;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
  margin-bottom: 15px;
}
.asya-chat.open {
  display: flex;
}

.chat-header {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 600;
}
.chat-header button {
  background: rgba(255,255,255,0.2);
  border: none;
  color: white;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  cursor: pointer;
  margin-left: 8px;
  transition: background 0.2s;
}
.chat-header button:hover {
  background: rgba(255,255,255,0.4);
}

.chat-body {
  display: flex;
  flex-direction: column;
  flex: 1;
  overflow: hidden;
}

#asya-messages {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.message {
  padding: 10px 14px;
  border-radius: 18px;
  max-width: 80%;
  word-wrap: break-word;
  line-height: 1.4;
}
.user-message {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}
.asya-message {
  background: #f0f0f0;
  color: #333;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}

.chat-input {
  display: flex;
  padding: 12px;
  border-top: 1px solid #eee;
  background: white;
  gap: 10px;
}
#asya-input {
  flex: 1;
  padding: 10px 15px;
  border-radius: 25px;
  border: 1px solid #ddd;
  font-size: 14px;
  outline: none;
  transition: border 0.2s;
}
#asya-input:focus {
  border-color: #667eea;
}
#asya-send {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  border: none;
  cursor: pointer;
  font-size: 18px;
  transition: transform 0.2s;
}
#asya-send:hover {
  transform: scale(1.05);
}

@media (max-width: 768px) {
  .asya-chat {
    width: 100vw;
    height: 100vh;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    border-radius: 0;
    margin: 0;
  }
  .asya-icon {
    width: 55px;
    height: 55px;
  }
  .icon-avatar {
    width: 30px;
    height: 30px;
  }
}
</style>

<script>
(function() {
  const icon = document.getElementById('asya-icon');
  const chat = document.getElementById('asya-chat');
  const closeBtn = document.getElementById('asya-close');
  const input = document.getElementById('asya-input');
  const sendBtn = document.getElementById('asya-send');
  const messages = document.getElementById('asya-messages');
  const analyticsBtn = document.getElementById('asya-analytics');

  if (!icon || !chat) return;

  let chatHistory = JSON.parse(localStorage.getItem('asya_chat_history') || '[]');

  function saveHistory() {
    const history = Array.from(messages.querySelectorAll('.message')).map(el => ({
      text: el.textContent,
      sender: el.classList.contains('user-message') ? 'user' : 'asya',
      timestamp: new Date().toISOString()
    }));
    localStorage.setItem('asya_chat_history', JSON.stringify(history));
    chatHistory = history;
  }

  function addMessage(text, sender) {
    const div = document.createElement('div');
    div.className = `message ${sender}-message`;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    saveHistory();
  }

  // Восстановление истории
  if (chatHistory.length > 0 && messages.children.length === 1) {
    messages.innerHTML = '';
    chatHistory.forEach(msg => {
      const div = document.createElement('div');
      div.className = `message ${msg.sender === 'user' ? 'user-message' : 'asya-message'}`;
      div.textContent = msg.text;
      messages.appendChild(div);
    });
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, 'user');
    input.value = '';

    // Индикатор печати
    const typingDiv = document.createElement('div');
    typingDiv.className = 'message asya-message';
    typingDiv.textContent = 'Ася печатает...';
    messages.appendChild(typingDiv);
    messages.scrollTop = messages.scrollHeight;

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: text,
          history: chatHistory.slice(-10)
        })
      });

      const data = await response.json();
      typingDiv.remove();

      if (data && data.reply) {
        addMessage(data.reply, 'asya');
      } else {
        addMessage('Ошибка ответа сервера 😕', 'asya');
      }
    } catch (error) {
      typingDiv.remove();
      const fallbacks = ['Нет соединения 🌐 Попробуй позже', 'Сервер недоступен 😕', 'Ошибка сети 🔄'];
      addMessage(fallbacks[Math.floor(Math.random() * fallbacks.length)], 'asya');
    }
  }

  async function getAnalytics() {
    try {
      const response = await fetch('/api/ai_insights');
      const data = await response.json();
      if (data.success) {
        addMessage("📊 Анализ:\n" + data.insights, 'asya');
      } else {
        addMessage('Недостаточно данных для анализа. Заполни календарь настроения! 📅', 'asya');
      }
    } catch {
      addMessage('Ошибка получения аналитики 🔄', 'asya');
    }
  }

  // Обработчики событий
  icon.onclick = () => chat.classList.toggle('open');
  closeBtn.onclick = () => chat.classList.remove('open');
  sendBtn.onclick = sendMessage;
  analyticsBtn.onclick = getAnalytics;
  input.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
})();
</script>
